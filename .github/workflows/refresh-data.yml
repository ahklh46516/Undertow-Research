name: Refresh market data

# Re-runs the P0 engine on a schedule and commits the refreshed snapshot so the
# published dashboard stays current without a long-lived local process.

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours (UTC)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run the engine
        run: python -m engine.pipeline

      - name: Commit refreshed data
        run: |
          git config user.name "undertow-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/data.json web/assets/heatmap.svg
          if git diff --staged --quiet; then
            echo "No data changes."
          else
            git commit -m "chore: refresh market data [skip ci]"
            git push
          fi
